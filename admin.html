<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover" />
  <title>北海道本格ジンギスカン ひつじや｜注文管理</title>

  <style>
    :root{
      --bg:#131110;
      --bg2:#0c0b0a;
      --card:#2b2420;
      --card2:#332b26;
      --line:rgba(255,244,230,.14);
      --text:#fff9f2;
      --muted:rgba(255,241,224,.70);
      --gold:#dfb96e;
      --danger:#a72922;
      --danger2:#7b1612;
      --ok:#3e7a4c;
      --ok2:#2f5f39;
      --shadow:0 18px 60px rgba(0,0,0,.45);
      --radius:18px;
    }

    *{ box-sizing:border-box; }

    html,body{
      max-width:100%;
      overflow-x:hidden;
    }

    body{
      margin:0;
      font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(223,185,110,.08), transparent 70%),
        radial-gradient(900px 500px at 90% 0%, rgba(223,185,110,.04), transparent 70%),
        linear-gradient(180deg, #1b1715 0%, var(--bg) 50%, var(--bg2) 100%);
      color:var(--text);
      min-height:100vh;
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:20px 12px 40px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:10px 0 18px;
      border-bottom:1px solid var(--line);
      margin-bottom:14px;
    }

    .titleArea{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .sheep-icon{
      font-size:30px;
      line-height:1;
      filter:drop-shadow(0 6px 14px rgba(0,0,0,.35));
      flex:0 0 auto;
    }

    .title{
      margin:0;
      font-size:clamp(20px,4.6vw,30px);
      font-weight:1000;
      letter-spacing:.05em;
      color:var(--gold);
      line-height:1.15;
    }

    .sub{
      margin:6px 0 0;
      color:var(--muted);
      font-size:13px;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .btn{
      border:none;
      cursor:pointer;
      font-weight:1000;
      transition:transform .12s ease, filter .18s ease;
      font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
      border-radius:12px;
      padding:10px 12px;
      font-size:13px;
      white-space:nowrap;
    }

    .btn:hover{
      filter:brightness(1.04);
    }

    .btn:active{
      transform:scale(.97);
    }

    .btn.sound{
      background:linear-gradient(180deg, rgba(223,185,110,.22), rgba(170,120,55,.18));
      color:var(--gold);
      border:1px solid rgba(223,185,110,.38);
    }

    .btn.reload{
      background:rgba(255,248,240,.06);
      color:var(--text);
      border:1px solid var(--line);
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:8px;
      margin-bottom:14px;
    }

    .statCard{
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      background:linear-gradient(180deg, rgba(255,248,240,.04), rgba(255,248,240,.02));
      box-shadow:var(--shadow);
      min-height:72px;
    }

    .statLabel{
      font-size:11px;
      color:var(--muted);
      margin-bottom:6px;
      line-height:1.2;
    }

    .statValue{
      font-size:18px;
      font-weight:1000;
      color:var(--gold);
      line-height:1.1;
      white-space:nowrap;
    }

    .panels{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
    }

    .panel{
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      background:linear-gradient(180deg, rgba(255,248,240,.04), rgba(255,248,240,.02));
      box-shadow:var(--shadow);
    }

    .panelTitle{
      padding:14px 16px;
      font-weight:1000;
      color:var(--gold);
      border-bottom:1px solid var(--line);
      background:rgba(255,248,240,.04);
      letter-spacing:.08em;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .panelTitleLeft{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      min-width:0;
    }

    .panelTitleText{
      white-space:nowrap;
      word-break:keep-all;
      line-height:1;
    }

    .countBadge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:28px;
      height:28px;
      padding:0 10px;
      border-radius:999px;
      border:1px solid rgba(223,185,110,.35);
      background:rgba(223,185,110,.12);
      color:var(--gold);
      font-size:13px;
      font-weight:1000;
      line-height:1;
      white-space:nowrap;
    }

    .panelBody{
      padding:14px;
    }

    .muted{
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
    }

    .orderList{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .orderCard{
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      background:
        linear-gradient(180deg, rgba(255,248,240,.06), rgba(255,248,240,.03)),
        linear-gradient(135deg, var(--card) 0%, var(--card2) 100%);
      position:relative;
      overflow:hidden;
      transition:transform .12s ease, box-shadow .18s ease;
    }

    .orderCard::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,.01) 0px,
          rgba(255,255,255,.01) 1px,
          transparent 1px,
          transparent 5px
        );
      opacity:.10;
    }

    .orderCard:hover{
      transform:translateY(-1px);
      box-shadow:0 12px 30px rgba(0,0,0,.18);
    }

    .orderHead{
      position:relative;
      z-index:1;
      margin-bottom:12px;
    }

    .orderMain{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      width:100%;
      flex-wrap:nowrap;
    }

    .orderMainLeft{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
      flex:1;
      flex-wrap:wrap;
    }

    .tableNo{
      font-size:22px;
      font-weight:1000;
      color:var(--gold);
      line-height:1.1;
      white-space:nowrap;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:4px 10px;
      border-radius:999px;
      border:1px solid rgba(223,185,110,.35);
      background:rgba(223,185,110,.10);
      color:var(--gold);
      font-size:12px;
      font-weight:1000;
      white-space:nowrap;
      line-height:1;
      flex-shrink:0;
    }

    .doneBadge{
      border-color:rgba(62,122,76,.35);
      background:rgba(62,122,76,.14);
      color:#c8f0d0;
    }

    .orderMetaInline{
      color:var(--muted);
      font-size:12px;
      line-height:1.4;
      white-space:nowrap;
      flex-shrink:0;
      text-align:right;
    }

    .itemList{
      position:relative;
      z-index:1;
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-bottom:12px;
    }

    .itemRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border:1px solid var(--line);
      border-radius:12px;
      background:rgba(255,248,240,.05);
      padding:10px 12px;
    }

    .itemName{
      font-weight:1000;
      line-height:1.4;
    }

    .itemQty{
      white-space:nowrap;
      font-weight:1000;
      color:var(--gold);
    }

    .orderFoot{
      position:relative;
      z-index:1;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:12px;
      flex-wrap:wrap;
    }

    .cardActions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .doneBtn,
    .deleteBtn,
    .clearAllBtn,
    .toggleBtn{
      border:none;
      border-radius:12px;
      font-weight:1000;
      cursor:pointer;
      transition:transform .12s ease, filter .18s ease;
      font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
      white-space:nowrap;
    }

    .doneBtn:hover,
    .deleteBtn:hover,
    .clearAllBtn:hover,
    .toggleBtn:hover{
      filter:brightness(1.05);
    }

    .doneBtn:active,
    .deleteBtn:active,
    .clearAllBtn:active,
    .toggleBtn:active{
      transform:scale(.97);
    }

    .doneBtn{
      background:linear-gradient(180deg, var(--ok), var(--ok2));
      color:#fff;
      padding:8px 12px;
      font-size:12px;
      min-width:72px;
    }

    .deleteBtn{
      background:linear-gradient(180deg, var(--danger), var(--danger2));
      color:#fff;
      padding:8px 12px;
      font-size:12px;
      min-width:72px;
    }

    .clearAllBtn{
      background:linear-gradient(180deg, var(--danger), var(--danger2));
      color:#fff;
      padding:8px 12px;
      font-size:12px;
    }

    .toggleBtn{
      background:rgba(255,248,240,.08);
      color:var(--text);
      border:1px solid var(--line);
      padding:8px 12px;
      font-size:12px;
    }

    .titleActions{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .collapsible{
      overflow:hidden;
      transition:max-height .22s ease, opacity .18s ease, padding .18s ease;
      max-height:3000px;
      opacity:1;
    }

    .collapsible.collapsed{
      max-height:0;
      opacity:0;
      padding-top:0;
      padding-bottom:0;
    }

    .empty{
      padding:22px 14px;
      text-align:center;
      color:var(--muted);
      border:1px dashed var(--line);
      border-radius:14px;
      background:rgba(255,248,240,.03);
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:24px;
      transform:translateX(-50%);
      background:rgba(40,31,27,.96);
      border:1px solid var(--line);
      color:var(--text);
      padding:12px 14px;
      border-radius:14px;
      box-shadow:var(--shadow);
      font-weight:900;
      display:none;
      max-width:min(560px, 92vw);
      z-index:9999;
      text-align:center;
    }

    @media (max-width:900px){
      .topbar{
        flex-direction:column;
        align-items:flex-start;
      }

      .actions{
        width:100%;
        justify-content:flex-start;
      }

      .stats{
        grid-template-columns:1fr 1fr;
      }

      .orderMain{
        display:flex;
        flex-direction:row;
        align-items:center;
        justify-content:space-between;
        gap:10px;
        flex-wrap:nowrap;
      }

      .orderMainLeft{
        flex:1;
        min-width:0;
      }

      .orderMetaInline{
        text-align:right;
        font-size:11px;
        white-space:nowrap;
        flex-shrink:0;
      }
    }

    @media (max-width:560px){
      .stats{
        grid-template-columns:1fr 1fr;
      }

      .statCard{
        min-height:64px;
        padding:9px 10px;
      }

      .statValue{
        font-size:16px;
      }

      .titleActions{
        width:auto;
        justify-content:flex-end;
      }

      .panelTitle{
        align-items:center;
      }

      .tableNo{
        font-size:20px;
      }

      .badge{
        font-size:11px;
        padding:4px 9px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="titleArea">
        <div class="sheep-icon" aria-hidden="true">🐑</div>
        <div>
          <h1 class="title">注文管理</h1>
          <p class="sub">ドリンクオーダーをリアルタイムで確認できます</p>
        </div>
      </div>

      <div class="actions">
        <button id="soundBtn" class="btn sound">音をON</button>
        <button id="reloadBtn" class="btn reload">再読み込み</button>
      </div>
    </div>

    <div class="stats">
      <div class="statCard">
        <div class="statLabel">現在の注文数</div>
        <div id="statOrderCount" class="statValue">0</div>
      </div>
      <div class="statCard">
        <div class="statLabel">合計点数</div>
        <div id="statQtyCount" class="statValue">0</div>
      </div>
      <div class="statCard">
        <div class="statLabel">最新テーブル</div>
        <div id="statTable" class="statValue">-</div>
      </div>
      <div class="statCard">
        <div class="statLabel">音の状態</div>
        <div id="statSound" class="statValue">OFF</div>
      </div>
    </div>

    <div class="panels">
      <div class="panel">
        <div class="panelTitle">
          <div class="panelTitleLeft">
            <span class="panelTitleText">現在の注文</span>
            <span id="activeCountBadge" class="countBadge">0</span>
          </div>
          <span class="muted">新しい順</span>
        </div>
        <div class="panelBody">
          <div id="orderList" class="orderList"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panelTitle">
          <span class="panelTitleText">完了済み</span>
          <div class="titleActions">
            <button id="toggleCompletedBtn" class="toggleBtn">折りたたむ</button>
            <button id="clearCompletedBtn" class="clearAllBtn">全削除</button>
          </div>
        </div>
        <div id="completedWrap" class="panelBody collapsible">
          <div id="completedList" class="orderList"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import {
      getFirestore,
      collection,
      query,
      orderBy,
      onSnapshot,
      limit,
      doc,
      updateDoc,
      deleteDoc,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBwehYqjyO7R982qHjTMiNGjQ2yPNEA7YU",
      authDomain: "order-app-ec18b.firebaseapp.com",
      projectId: "order-app-ec18b",
      storageBucket: "order-app-ec18b.firebasestorage.app",
      messagingSenderId: "756193856808",
      appId: "1:756193856808:web:f2200287017adaf895541d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const orderList = document.getElementById("orderList");
    const completedList = document.getElementById("completedList");
    const statOrderCount = document.getElementById("statOrderCount");
    const statQtyCount = document.getElementById("statQtyCount");
    const statTable = document.getElementById("statTable");
    const statSound = document.getElementById("statSound");
    const activeCountBadge = document.getElementById("activeCountBadge");
    const soundBtn = document.getElementById("soundBtn");
    const reloadBtn = document.getElementById("reloadBtn");
    const clearCompletedBtn = document.getElementById("clearCompletedBtn");
    const toggleCompletedBtn = document.getElementById("toggleCompletedBtn");
    const completedWrap = document.getElementById("completedWrap");

    let audioCtx = null;
    let soundEnabled = false;
    let initialized = false;
    let knownActiveIds = new Set();
    let completedCollapsed = false;

    function toast(msg){
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.style.display = "block";
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => t.style.display = "none", 2200);
    }

    function ensureAudio(){
      if (!audioCtx){
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return null;
        audioCtx = new Ctx();
      }
      return audioCtx;
    }

    async function enableSound(){
      try{
        const ctx = ensureAudio();
        if (!ctx){
          toast("この端末では音が使えません");
          return;
        }
        if (ctx.state === "suspended"){
          await ctx.resume();
        }
        soundEnabled = true;
        statSound.textContent = "ON";
        soundBtn.textContent = "音をON";
        toast("音を有効にしました");
      } catch (e){
        console.error(e);
        toast("音の有効化に失敗しました");
      }
    }

    function playSound(){
      if (!soundEnabled) return;

      try{
        const ctx = ensureAudio();
        if (!ctx) return;

        const now = ctx.currentTime;

        const osc1 = ctx.createOscillator();
        const gain1 = ctx.createGain();
        osc1.type = "sine";
        osc1.frequency.setValueAtTime(880, now);
        osc1.frequency.exponentialRampToValueAtTime(660, now + 0.12);
        gain1.gain.setValueAtTime(0.0001, now);
        gain1.gain.exponentialRampToValueAtTime(0.08, now + 0.01);
        gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
        osc1.connect(gain1);
        gain1.connect(ctx.destination);
        osc1.start(now);
        osc1.stop(now + 0.18);

        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.type = "triangle";
        osc2.frequency.setValueAtTime(1046, now + 0.16);
        osc2.frequency.exponentialRampToValueAtTime(880, now + 0.30);
        gain2.gain.setValueAtTime(0.0001, now + 0.16);
        gain2.gain.exponentialRampToValueAtTime(0.07, now + 0.18);
        gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.34);
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.start(now + 0.16);
        osc2.stop(now + 0.34);
      } catch (e){
        console.error(e);
      }
    }

    function formatTime(ts){
      try{
        if (!ts?.toDate) return "-";
        return ts.toDate().toLocaleString("ja-JP", {
          month:"2-digit",
          day:"2-digit",
          hour:"2-digit",
          minute:"2-digit",
          second:"2-digit"
        });
      } catch {
        return "-";
      }
    }

    function totalQty(items){
      return (items || []).reduce((sum, item) => sum + Number(item.qty || 0), 0);
    }

    async function markCompleted(id){
      try{
        await updateDoc(doc(db, "orders", id), {
          status: "completed"
        });
        toast("完了済みに移動しました");
      } catch (e){
        console.error(e);
        toast("更新に失敗しました");
      }
    }

    async function removeCompleted(id){
      try{
        await deleteDoc(doc(db, "orders", id));
        toast("履歴を削除しました");
      } catch (e){
        console.error(e);
        toast("削除に失敗しました");
      }
    }

    async function clearAllCompleted(){
      try{
        const qCompleted = query(
          collection(db, "orders"),
          orderBy("createdAt", "desc"),
          limit(200)
        );
        const snapshot = await getDocs(qCompleted);
        const completedDocs = snapshot.docs.filter(d => (d.data().status || "") === "completed");

        if (!completedDocs.length){
          toast("削除する完了済み履歴がありません");
          return;
        }

        for (const d of completedDocs){
          await deleteDoc(doc(db, "orders", d.id));
        }

        toast("完了済み履歴を全削除しました");
      } catch (e){
        console.error(e);
        toast("全削除に失敗しました");
      }
    }

    function toggleCompleted(){
      completedCollapsed = !completedCollapsed;
      completedWrap.classList.toggle("collapsed", completedCollapsed);
      toggleCompletedBtn.textContent = completedCollapsed ? "開く" : "折りたたむ";
    }

    function renderCard(d, isCompleted = false){
      const data = d.data();
      const items = data.items || [];
      const qty = totalQty(items);

      return `
        <div class="orderCard">
          <div class="orderHead">
            <div class="orderMain">
              <div class="orderMainLeft">
                <div class="tableNo">テーブル ${data.table ?? "-"}</div>
                ${isCompleted ? `<div class="badge doneBadge">完了済み</div>` : ``}
              </div>
              <div class="orderMetaInline">${formatTime(data.createdAt)} / 合計 ${qty} 点</div>
            </div>
          </div>

          <div class="itemList">
            ${items.map(item => `
              <div class="itemRow">
                <div class="itemName">${item.name}</div>
                <div class="itemQty">×${item.qty}</div>
              </div>
            `).join("")}
          </div>

          <div class="orderFoot">
            <div class="cardActions">
              ${isCompleted
                ? `<button class="deleteBtn" data-delete="${d.id}">削除</button>`
                : `<button class="doneBtn" data-done="${d.id}">完了</button>`
              }
            </div>
          </div>
        </div>
      `;
    }

    function renderOrders(docs){
      const activeDocs = docs.filter(d => (d.data().status || "new") !== "completed");
      const completedDocs = docs.filter(d => (d.data().status || "") === "completed");

      statOrderCount.textContent = String(activeDocs.length);
      activeCountBadge.textContent = String(activeDocs.length);

      const qtySum = activeDocs.reduce((sum, d) => {
        return sum + totalQty(d.data().items || []);
      }, 0);
      statQtyCount.textContent = String(qtySum);

      statTable.textContent = activeDocs.length ? String(activeDocs[0].data().table ?? "-") : "-";

      orderList.innerHTML = activeDocs.length
        ? activeDocs.map(d => renderCard(d, false)).join("")
        : `<div class="empty">現在、注文はありません</div>`;

      completedList.innerHTML = completedDocs.length
        ? completedDocs.map(d => renderCard(d, true)).join("")
        : `<div class="empty">完了済みの注文はありません</div>`;

      clearCompletedBtn.disabled = completedDocs.length === 0;
      clearCompletedBtn.style.opacity = completedDocs.length === 0 ? "0.5" : "1";

      return activeDocs;
    }

    orderList.addEventListener("click", async (e) => {
      const btn = e.target.closest("[data-done]");
      if (!btn) return;

      const id = btn.getAttribute("data-done");
      const ok = confirm("この注文を完了済みに移動しますか？");
      if (!ok) return;
      await markCompleted(id);
    });

    completedList.addEventListener("click", async (e) => {
      const btn = e.target.closest("[data-delete]");
      if (!btn) return;

      const id = btn.getAttribute("data-delete");
      const ok = confirm("この履歴を削除しますか？");
      if (!ok) return;
      await removeCompleted(id);
    });

    clearCompletedBtn.addEventListener("click", async () => {
      const ok = confirm("完了済みの履歴をすべて削除しますか？");
      if (!ok) return;
      await clearAllCompleted();
    });

    toggleCompletedBtn.addEventListener("click", toggleCompleted);
    soundBtn.addEventListener("click", enableSound);
    reloadBtn.addEventListener("click", () => location.reload());

    const q = query(
      collection(db, "orders"),
      orderBy("createdAt", "desc"),
      limit(200)
    );

    onSnapshot(q, (snapshot) => {
      const activeDocs = renderOrders(snapshot.docs);
      const currentActiveIds = new Set(activeDocs.map(d => d.id));

      if (!initialized){
        knownActiveIds = currentActiveIds;
        initialized = true;
        return;
      }

      let hasNew = false;
      for (const d of activeDocs){
        if (!knownActiveIds.has(d.id)){
          hasNew = true;
          break;
        }
      }

      if (hasNew){
        playSound();
        toast("新しい注文が入りました");
      }

      knownActiveIds = currentActiveIds;
    }, (e) => {
      console.error(e);
      toast("注文の取得に失敗しました");
      orderList.innerHTML = `<div class="empty">注文の取得に失敗しました</div>`;
      completedList.innerHTML = `<div class="empty">履歴の取得に失敗しました</div>`;
    });
  </script>
</body>
</html>
