<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover" />
  <title>北海道本格ジンギスカン ひつじや｜ご注文</title>

  <style>
    :root{
      --bg:#131110;
      --bg2:#0c0b0a;
      --panel:#1d1917;
      --panel2:#26201d;
      --card:#2b2420;
      --card2:#332b26;
      --line:rgba(255,244,230,.14);
      --text:#fff9f2;
      --muted:rgba(255,241,224,.70);
      --gold:#dfb96e;
      --danger:#a72922;
      --danger2:#7b1612;
      --shadow:0 18px 60px rgba(0,0,0,.45);
      --radius:18px;
    }

    *{ box-sizing:border-box; }

    html,body{
      max-width:100%;
      overflow-x:hidden;
    }

    body{
      margin:0;
      font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(223,185,110,.08), transparent 70%),
        radial-gradient(900px 500px at 90% 0%, rgba(223,185,110,.04), transparent 70%),
        linear-gradient(180deg, #1b1715 0%, var(--bg) 50%, var(--bg2) 100%);
      color:var(--text);
      font-size:14px;
      overflow-x:hidden;
    }

    body.menu-open{
      overflow:hidden;
      touch-action:none;
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:20px 12px 94px;
    }

    header{
      padding:10px 0 18px;
      border-bottom:1px solid var(--line);
      margin-bottom:14px;
      position:relative;
    }

    .title-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .title-text{
      text-align:center;
      width:100%;
      max-width:min(96vw, 860px);
    }

    .title{
      margin:0 0 6px;
      line-height:1.15;
      text-align:center;
      font-size:clamp(20px,4.7vw,31px);
      font-weight:1000;
      letter-spacing:.04em;
      color:var(--gold);
      white-space:nowrap;
      text-shadow:0 2px 12px rgba(200,164,90,.28);
    }

    .sub{
      margin:0;
      color:var(--muted);
      font-size:clamp(12px,2.6vw,14px);
      text-align:center;
    }

    .topRow{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,248,240,.04);
      color:var(--muted);
      font-size:12px;
    }

    .pill strong{ color:var(--text); }

    .layout{
      display:grid;
      grid-template-columns:1fr;
      gap:16px;
    }

    @media (min-width:980px){
      .layout{
        grid-template-columns:240px 1fr;
        align-items:start;
      }
    }

    .navCard{
      background:linear-gradient(180deg, rgba(255,248,240,.04), rgba(255,248,240,.02));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      position:sticky;
      top:14px;
    }

    .navTitle{
      padding:14px;
      font-weight:1000;
      color:var(--gold);
      border-bottom:1px solid var(--line);
      background:rgba(255,248,240,.04);
      letter-spacing:.08em;
      text-shadow:0 2px 12px rgba(200,164,90,.28);
    }

    .navList{
      display:flex;
      flex-direction:column;
      gap:8px;
      padding:12px;
    }

    .navBtn{
      display:flex;
      justify-content:space-between;
      align-items:center;
      border:1px solid var(--line);
      background:rgba(255,248,240,.05);
      color:var(--text);
      padding:12px 14px;
      border-radius:14px;
      text-decoration:none;
      font-weight:900;
      font-size:17px;
      transition:.18s ease;
      cursor:pointer;
      gap:10px;
      letter-spacing:.03em;
    }

    .navBtn:hover{
      background:rgba(223,185,110,.12);
      border-color:rgba(223,185,110,.35);
      transform:translateY(-1px);
    }

    .navBtn small{
      color:var(--muted);
      font-weight:800;
      font-size:13px;
    }

    @media (max-width:979px){
      .navCard{ display:none; }
    }

    .card{
      background:linear-gradient(180deg, rgba(255,248,240,.04), rgba(255,248,240,.02));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .panelTitle{
      padding:14px 16px;
      font-weight:1000;
      color:var(--gold);
      border-bottom:1px solid var(--line);
      background:rgba(255,248,240,.04);
      letter-spacing:.08em;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      text-shadow:0 2px 12px rgba(200,164,90,.28);
    }

    .menuWrap{ padding:14px; }

    .section{
      margin:6px 0 14px;
      scroll-margin-top:86px;
    }

    .sectionHead{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:12px;
      padding:10px 10px 12px;
      border-bottom:1px solid var(--line);
      margin-bottom:12px;
    }

    .sectionHead h2{
      margin:0;
      font-size:18px;
      font-weight:1000;
      letter-spacing:.06em;
      color:var(--text);
      text-shadow:0 2px 12px rgba(200,164,90,.28);
    }

    .sectionHead p{
      margin:0;
      font-size:11px;
      color:var(--muted);
      opacity:.8;
      letter-spacing:.05em;
    }

    .menuGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .itemCard{
      border:1px solid var(--line);
      border-radius:16px;
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:8px;
      min-height:170px;
      position:relative;
      overflow:hidden;
      transition:transform .12s ease, box-shadow .18s ease;
      background:
        linear-gradient(180deg, rgba(255,248,240,.06), rgba(255,248,240,.03)),
        linear-gradient(135deg, var(--card) 0%, var(--card2) 100%);
    }

    .itemCard::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,.01) 0px,
          rgba(255,255,255,.01) 1px,
          transparent 1px,
          transparent 5px
        );
      opacity:.10;
    }

    .itemCard:hover{
      transform:translateY(-2px);
      box-shadow:0 12px 30px rgba(0,0,0,.25);
    }

    .itemCard.flash{
      box-shadow:0 0 0 2px rgba(223,185,110,.5), 0 18px 60px rgba(0,0,0,.38);
      transform:translateY(-1px);
    }

    .flashMark{
      position:absolute;
      top:10px;
      right:10px;
      width:32px;
      height:32px;
      border-radius:999px;
      display:none;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(255,245,230,.18);
      background:rgba(60,40,30,.35);
      font-weight:1000;
      z-index:1;
    }

    .itemCard.flash .flashMark{ display:flex; }

    .itemCard h3{
      margin:0;
      font-size:17px;
      font-weight:1000;
      letter-spacing:.03em;
      line-height:1.2;
      position:relative;
      z-index:1;
    }

    .desc{
      margin:0;
      font-size:12px;
      color:var(--muted);
      line-height:1.35;
      min-height:14px;
      position:relative;
      z-index:1;
    }

    .stepRow{
      margin-top:auto;
      display:grid;
      gap:8px;
      position:relative;
      z-index:1;
    }

    .stepper{
      display:flex;
      align-items:center;
      gap:10px;
      border:1px solid var(--line);
      background:rgba(255,248,240,.05);
      border-radius:14px;
      padding:8px 10px;
      min-width:148px;
      justify-content:center;
    }

    .stepBtn{
      width:40px;
      height:40px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,248,240,.10);
      color:var(--text);
      font-weight:1000;
      cursor:pointer;
      font-size:20px;
      flex:0 0 auto;
      transition:transform .12s ease, background .18s ease, box-shadow .18s ease;
      user-select:none;
      -webkit-user-select:none;
      touch-action:manipulation;
    }

    .stepBtn:hover{
      background:rgba(255,248,240,.16);
    }

    .stepBtn:active{
      transform:scale(.94);
      box-shadow:0 0 0 2px rgba(223,185,110,.18) inset;
    }

    .stepQty{
      min-width:28px;
      text-align:center;
      font-weight:1000;
      font-size:18px;
      flex:0 0 auto;
    }

    .cartAddBtn,
    .bottomOrderBtn,
    .confirmBtn,
    .cancelBtn{
      border:none;
      cursor:pointer;
      font-weight:1000;
      transition:transform .12s ease, filter .18s ease, box-shadow .18s ease;
      border-radius:14px;
      font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
    }

    .cartAddBtn{
      width:100%;
      background:linear-gradient(180deg, rgba(223,185,110,.22), rgba(170,120,55,.18));
      color:var(--gold);
      border:1px solid rgba(223,185,110,.38);
      letter-spacing:.04em;
      height:42px;
    }

    .cartAddBtn:hover,
    .bottomOrderBtn:hover,
    .confirmBtn:hover,
    .cancelBtn:hover{
      filter:brightness(1.04);
    }

    .cartAddBtn:active,
    .bottomOrderBtn:active,
    .confirmBtn:active,
    .cancelBtn:active{
      transform:scale(.97);
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:84px;
      transform:translateX(-50%);
      background:rgba(40,31,27,.96);
      border:1px solid var(--line);
      color:var(--text);
      padding:12px 14px;
      border-radius:14px;
      box-shadow:var(--shadow);
      font-weight:900;
      display:none;
      max-width:min(560px, 92vw);
      z-index:9999;
      text-align:center;
    }

    .hamburger{
      display:none;
      position:fixed;
      top:calc(env(safe-area-inset-top) + 50px);
      left:14px;
      z-index:1002;
      width:44px;
      height:44px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(35,28,24,.56);
      backdrop-filter:blur(10px);
      cursor:pointer;
      align-items:cent
