<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover" />
  <title>北海道本格ジンギスカン ひつじや｜ご注文</title>

  <style>
    :root{
      --bg:#131110;
      --bg2:#0c0b0a;
      --panel:#1d1917;
      --panel2:#26201d;
      --card:#2b2420;
      --card2:#332b26;
      --line:rgba(255,244,230,.14);
      --text:#fff9f2;
      --muted:rgba(255,241,224,.70);
      --gold:#dfb96e;
      --danger:#a72922;
      --danger2:#7b1612;
      --shadow:0 18px 60px rgba(0,0,0,.45);
      --radius:18px;
    }

    *{ box-sizing:border-box; }

    html,body{
      max-width:100%;
      overflow-x:hidden;
    }

    body{
      margin:0;
      font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(223,185,110,.08), transparent 70%),
        radial-gradient(900px 500px at 90% 0%, rgba(223,185,110,.04), transparent 70%),
        linear-gradient(180deg, #1b1715 0%, var(--bg) 50%, var(--bg2) 100%);
      color:var(--text);
      font-size:14px;
      overflow-x:hidden;
    }

    body.menu-open{
      overflow:hidden;
      touch-action:none;
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:20px 12px 94px;
    }

    header{
      padding:10px 0 18px;
      border-bottom:1px solid var(--line);
      margin-bottom:14px;
      position:relative;
    }

    .title-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .title-text{
      text-align:center;
      width:100%;
      max-width:min(96vw, 860px);
    }

    .title{
      margin:0 0 6px;
      line-height:1.15;
      text-align:center;
      font-size:clamp(20px,4.7vw,31px);
      font-weight:1000;
      letter-spacing:.04em;
      color:var(--gold);
      white-space:nowrap;
      text-shadow:0 2px 12px rgba(200,164,90,.28);
    }

    .sub{
      margin:0;
      color:var(--muted);
      font-size:clamp(12px,2.6vw,14px);
      text-align:center;
    }

    .topRow{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,248,240,.04);
      color:var(--muted);
      font-size:12px;
    }

    .pill strong{ color:var(--text); }

    .layout{
      display:grid;
      grid-template-columns:1fr;
      gap:16px;
    }

    @media (min-width:980px){
      .layout{
        grid-template-columns:240px 1fr;
        align-items:start;
      }
    }

    .navCard{
      background:linear-gradient(180deg, rgba(255,248,240,.04), rgba(255,248,240,.02));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      position:sticky;
      top:14px;
    }

    .navTitle{
      padding:14px;
      font-weight:1000;
      color:var(--gold);
      border-bottom:1px solid var(--line);
      background:rgba(255,248,240,.04);
      letter-spacing:.08em;
      text-shadow:0 2px 12px rgba(200,164,90,.28);
    }

    .navList{
      display:flex;
      flex-direction:column;
      gap:8px;
      padding:12px;
    }

    .navBtn{
      display:flex;
      justify-content:space-between;
      align-items:center;
      border:1px solid var(--line);
      background:rgba(255,248,240,.05);
      color:var(--text);
      padding:12px 14px;
      border-radius:14px;
      text-decoration:none;
      font-weight:900;
      font-size:17px;
      transition:.18s ease;
      cursor:pointer;
      gap:10px;
      letter-spacing:.03em;
    }

    .navBtn:hover{
      background:rgba(223,185,110,.12);
      border-color:rgba(223,185,110,.35);
      transform:translateY(-1px);
    }

    .navBtn small{
      color:var(--muted);
      font-weight:800;
      font-size:13px;
    }

    @media (max-width:979px){
      .navCard{ display:none; }
    }

    .card{
      background:linear-gradient(180deg, rgba(255,248,240,.04), rgba(255,248,240,.02));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .panelTitle{
      padding:14px 16px;
      font-weight:1000;
      color:var(--gold);
      border-bottom:1px solid var(--line);
      background:rgba(255,248,240,.04);
      letter-spacing:.08em;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      text-shadow:0 2px 12px rgba(200,164,90,.28);
    }

    .menuWrap{ padding:14px; }

    .section{
      margin:6px 0 14px;
      scroll-margin-top:86px;
    }

    .sectionHead{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:12px;
      padding:10px 10px 12px;
      border-bottom:1px solid var(--line);
      margin-bottom:12px;
    }

    .sectionHead h2{
      margin:0;
      font-size:18px;
      font-weight:1000;
      letter-spacing:.06em;
      color:var(--text);
      text-shadow:0 2px 12px rgba(200,164,90,.28);
    }

    .sectionHead p{
      margin:0;
      font-size:11px;
      color:var(--muted);
      opacity:.8;
      letter-spacing:.05em;
    }

    .menuGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .itemCard{
      border:1px solid var(--line);
      border-radius:16px;
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:8px;
      min-height:170px;
      position:relative;
      overflow:hidden;
      transition:transform .12s ease, box-shadow .18s ease;
      background:
        linear-gradient(180deg, rgba(255,248,240,.06), rgba(255,248,240,.03)),
        linear-gradient(135deg, var(--card) 0%, var(--card2) 100%);
    }

    .itemCard::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,.01) 0px,
          rgba(255,255,255,.01) 1px,
          transparent 1px,
          transparent 5px
        );
      opacity:.10;
    }

    .itemCard:hover{
      transform:translateY(-2px);
      box-shadow:0 12px 30px rgba(0,0,0,.25);
    }

    .itemCard.flash{
      box-shadow:0 0 0 2px rgba(223,185,110,.5), 0 18px 60px rgba(0,0,0,.38);
      transform:translateY(-1px);
    }

    .flashMark{
      position:absolute;
      top:10px;
      right:10px;
      width:32px;
      height:32px;
      border-radius:999px;
      display:none;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(255,245,230,.18);
      background:rgba(60,40,30,.35);
      font-weight:1000;
      z-index:1;
    }

    .itemCard.flash .flashMark{ display:flex; }

    .itemCard h3{
      margin:0;
      font-size:17px;
      font-weight:1000;
      letter-spacing:.03em;
      line-height:1.2;
      position:relative;
      z-index:1;
    }

    .desc{
      margin:0;
      font-size:12px;
      color:var(--muted);
      line-height:1.35;
      min-height:14px;
      position:relative;
      z-index:1;
    }

    .stepRow{
      margin-top:auto;
      display:grid;
      gap:8px;
      position:relative;
      z-index:1;
    }

    .stepper{
      display:flex;
      align-items:center;
      gap:10px;
      border:1px solid var(--line);
      background:rgba(255,248,240,.05);
      border-radius:14px;
      padding:8px 10px;
      min-width:148px;
      justify-content:center;
    }

    .stepBtn{
      width:40px;
      height:40px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,248,240,.10);
      color:var(--text);
      font-weight:1000;
      cursor:pointer;
      font-size:20px;
      flex:0 0 auto;
      transition:transform .12s ease, background .18s ease, box-shadow .18s ease;
      user-select:none;
      -webkit-user-select:none;
      touch-action:manipulation;
    }

    .stepBtn:hover{
      background:rgba(255,248,240,.16);
    }

    .stepBtn:active{
      transform:scale(.94);
      box-shadow:0 0 0 2px rgba(223,185,110,.18) inset;
    }

    .stepQty{
      min-width:28px;
      text-align:center;
      font-weight:1000;
      font-size:18px;
      flex:0 0 auto;
    }

    .cartAddBtn,
    .bottomOrderBtn,
    .confirmBtn,
    .cancelBtn{
      border:none;
      cursor:pointer;
      font-weight:1000;
      transition:transform .12s ease, filter .18s ease, box-shadow .18s ease;
      border-radius:14px;
      font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
    }

    .cartAddBtn{
      width:100%;
      background:linear-gradient(180deg, rgba(223,185,110,.22), rgba(170,120,55,.18));
      color:var(--gold);
      border:1px solid rgba(223,185,110,.38);
      letter-spacing:.04em;
      height:42px;
    }

    .cartAddBtn:hover,
    .bottomOrderBtn:hover,
    .confirmBtn:hover,
    .cancelBtn:hover{
      filter:brightness(1.04);
    }

    .cartAddBtn:active,
    .bottomOrderBtn:active,
    .confirmBtn:active,
    .cancelBtn:active{
      transform:scale(.97);
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:84px;
      transform:translateX(-50%);
      background:rgba(40,31,27,.96);
      border:1px solid var(--line);
      color:var(--text);
      padding:12px 14px;
      border-radius:14px;
      box-shadow:var(--shadow);
      font-weight:900;
      display:none;
      max-width:min(560px, 92vw);
      z-index:9999;
      text-align:center;
    }

    .hamburger{
      display:none;
      position:fixed;
      top:calc(env(safe-area-inset-top) + 50px);
      left:14px;
      z-index:1002;
      width:44px;
      height:44px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(35,28,24,.56);
      backdrop-filter:blur(10px);
      cursor:pointer;
      align-items:center;
      justify-content:center;
      gap:3px;
      flex-direction:column;
    }

    .hamburger span{
      width:18px;
      height:2px;
      background:rgba(255,248,240,.9);
      border-radius:2px;
      display:block;
    }

    .drawerOverlay,
    .confirmOverlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.48);
      z-index:1000;
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease;
    }

    .drawerOverlay.show,
    .confirmOverlay.show{
      opacity:1;
      pointer-events:auto;
    }

    .drawer{
      position:fixed;
      top:calc(env(safe-area-inset-top) + 18px);
      left:0;
      height:calc(100dvh - env(safe-area-inset-top) - 18px);
      width:min(320px, 86vw);
      z-index:1001;
      transform:translateX(-102%);
      transition:transform .18s ease;
      padding:24px 14px 14px;
      background:rgba(30,24,21,.98);
      backdrop-filter:blur(12px);
      border-right:1px solid rgba(255,245,230,.10);
      box-shadow:0 18px 60px rgba(0,0,0,.35);
      overflow:auto;
    }

    .drawer.show{ transform:translateX(0); }

    .drawerHead{
     display:flex;
     align-items:center;
     justify-content:space-between;
     padding:6px 4px 12px 28px;
     border-bottom:1px solid rgba(255,245,230,.10);
     margin-bottom:10px;
     margin-top:6px;
    }

    .drawerTitle{
     font-weight:1000;
     color:var(--gold);
     letter-spacing:.08em;
     text-shadow:0 2px 12px rgba(200,164,90,.28);
     margin-left:24px;
    }

    .drawerClose{
      width:36px;
      height:36px;
      border-radius:10px;
      border:1px solid var(--line);
      background:rgba(255,248,240,.04);
      color:rgba(255,248,240,.9);
      font-size:18px;
      cursor:pointer;
    }

    .bottomBar{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      display:flex;
      padding:10px 12px calc(10px + env(safe-area-inset-bottom));
      background:rgba(24,20,18,.97);
      border-top:1px solid var(--line);
      backdrop-filter:blur(10px);
      z-index:9998;
    }

    .bottomOrderBtn{
      width:100%;
      background:linear-gradient(180deg, var(--danger), var(--danger2));
      color:#fff;
      padding:15px 16px;
      font-size:17px;
      font-weight:1000;
      letter-spacing:.06em;
      box-shadow:0 10px 24px rgba(111,19,19,.25);
      text-shadow:0 1px 6px rgba(255,255,255,.2);
    }

    .btnCount{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:24px;
      height:24px;
      padding:0 8px;
      margin-left:8px;
      border-radius:999px;
      border:1px solid rgba(255,245,230,.18);
      background:rgba(255,248,240,.10);
      font-size:12px;
      color:#fff;
      vertical-align:middle;
    }

    .confirmModal{
      position:fixed;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%) scale(.96);
      width:min(640px, 92vw);
      max-height:78vh;
      overflow:hidden;
      z-index:10020;
      background:linear-gradient(180deg, rgba(34,28,24,.98), rgba(22,18,16,.98));
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:0 24px 70px rgba(0,0,0,.45);
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease, transform .18s ease;
    }

    .confirmModal.show{
      opacity:1;
      pointer-events:auto;
      transform:translate(-50%,-50%) scale(1);
    }

    .confirmHead{
      padding:16px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      color:var(--gold);
      font-weight:1000;
      letter-spacing:.06em;
      text-shadow:0 2px 12px rgba(200,164,90,.28);
    }

    .confirmBody{
      padding:14px;
      max-height:52vh;
      overflow:auto;
    }

    .confirmEmpty{
      color:var(--muted);
      text-align:center;
      padding:24px 10px;
      border:1px dashed var(--line);
      border-radius:14px;
      background:rgba(255,248,240,.03);
    }

    .confirmList{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .confirmRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border:1px solid var(--line);
      border-radius:12px;
      background:rgba(255,248,240,.05);
      padding:10px 12px;
    }

    .confirmName{
      font-weight:1000;
      line-height:1.4;
    }

    .confirmQty{
      color:var(--gold);
      font-weight:1000;
      white-space:nowrap;
    }

    .confirmFoot{
      padding:14px 16px 16px;
      border-top:1px solid var(--line);
      display:grid;
      gap:10px;
    }

    .confirmSummary{
      color:var(--muted);
      font-size:13px;
    }

    .confirmActions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .cancelBtn{
      background:rgba(255,248,240,.08);
      color:var(--text);
      border:1px solid var(--line);
      padding:13px 14px;
    }

    .confirmBtn{
      background:linear-gradient(180deg, var(--danger), var(--danger2));
      color:#fff;
      padding:13px 14px;
    }

    .foot{
      margin-top:18px;
      text-align:center;
      color:rgba(255,240,225,.5);
      font-size:12px;
    }

    @media (max-width:979px){
      .wrap{ padding:14px 12px 92px; }
      header{ padding:8px 0 14px; margin-bottom:14px; }
      .menuWrap{ padding:12px; }
      .panelTitle{ padding:12px 14px; }
      .card{ box-shadow:0 10px 30px rgba(0,0,0,.28); }
      .hamburger{ display:flex; }
    }

    @media (max-width:640px){
      .menuGrid{
        grid-template-columns:1fr 1fr;
        gap:10px;
      }

      .itemCard{
        min-height:164px;
        padding:10px;
      }

      .itemCard h3{
        font-size:15px;
      }

      .stepper{
        min-width:100%;
        gap:8px;
      }

      .stepBtn{
        width:36px;
        height:36px;
        font-size:18px;
      }

      .stepQty{
        font-size:16px;
      }

      .cartAddBtn{
        height:40px;
        font-size:13px;
      }

      .confirmActions{
        grid-template-columns:1fr;
      }

      .title{
        font-size:clamp(18px,4.9vw,24px);
        white-space:normal;
      }
    }
  </style>
</head>

<body>
  <button id="hamburger" class="hamburger" aria-label="カテゴリを開く">
    <span></span><span></span><span></span>
  </button>

  <div id="drawerOverlay" class="drawerOverlay"></div>
  <div id="confirmOverlay" class="confirmOverlay"></div>

  <aside id="drawer" class="drawer" aria-hidden="true">
    <div class="drawerHead">
      <div class="drawerTitle">カテゴリ</div>
      <button id="drawerClose" class="drawerClose" aria-label="閉じる">×</button>
    </div>
    <div id="drawerNav" class="navList"></div>
  </aside>

  <div id="confirmModal" class="confirmModal" aria-hidden="true">
    <div class="confirmHead">
      <span>注文内容の確認</span>
      <button id="confirmClose" class="drawerClose" aria-label="閉じる">×</button>
    </div>
    <div class="confirmBody">
      <div id="confirmContent"></div>
    </div>
    <div class="confirmFoot">
      <div id="confirmSummary" class="confirmSummary"></div>
      <div class="confirmActions">
        <button id="cancelConfirm" class="cancelBtn">戻る</button>
        <button id="finalOrderBtn" class="confirmBtn">この内容で注文する</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <header>
      <div class="title-wrap">
        <div class="title-text">
          <h1 class="title">🐑 北海道本格ジンギスカン ひつじや 🐑</h1>
          <p class="sub">ごゆっくりお選びください</p>
        </div>
      </div>

      <div class="topRow">
        <div id="tablePill" class="pill" style="display:none;">
          テーブル <strong id="tableNo">-</strong>
        </div>
      </div>
    </header>

    <div class="layout">
      <aside class="navCard">
        <div class="navTitle">カテゴリ</div>
        <div id="catNav" class="navList"></div>
      </aside>

      <section class="card">
        <div class="panelTitle">
          <span>メニュー</span>
        </div>
        <div class="menuWrap" id="menu"></div>
      </section>
    </div>

    <div class="foot">※ 商品をカートに入れて、下の注文ボタンから送信してください</div>
  </div>

  <div id="toast" class="toast"></div>

  <div class="bottomBar">
    <button id="bottomOrderBtn" class="bottomOrderBtn">注文する <span id="cartCount" class="btnCount">0</span></button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import {
      getFirestore, collection, addDoc, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBwehYqjyO7R982qHjTMiNGjQ2yPNEA7YU",
      authDomain: "order-app-ec18b.firebaseapp.com",
      projectId: "order-app-ec18b",
      storageBucket: "order-app-ec18b.firebasestorage.app",
      messagingSenderId: "756193856808",
      appId: "1:756193856808:web:f2200287017adaf895541d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const CATEGORIES = [
      { id:"beer", label:"ビール" },
      { id:"high", label:"ハイボール" },
      { id:"sour", label:"サワー" },
      { id:"cock", label:"カクテル" },
      { id:"wine", label:"ワイン" },
      { id:"soft", label:"ソフトドリンク" }
    ];

    const MENU = [
      { id:"beer_classic", category:"beer", name:"クラシック", desc:"" },
      { id:"beer_black", category:"beer", name:"黒ラベル", desc:"" },

      { id:"high_std", category:"high", name:"ハイボール", desc:"" },
      { id:"high_coke", category:"high", name:"コークハイ", desc:"" },
      { id:"high_ginger", category:"high", name:"ジンジャーハイ", desc:"" },

      { id:"sour_lemon", category:"sour", name:"レモンサワー", desc:"" },
      { id:"sour_grape", category:"sour", name:"グレープフルーツサワー", desc:"" },
      { id:"sour_ume", category:"sour", name:"梅サワー", desc:"" },

      { id:"cock_cassis_orange", category:"cock", name:"カシスオレンジ", desc:"" },
      { id:"cock_fuzzy", category:"cock", name:"ファジーネーブル", desc:"" },
      { id:"cock_cassis_soda", category:"cock", name:"カシスソーダ", desc:"" },

      { id:"wine_red", category:"wine", name:"赤ワイン", desc:"" },
      { id:"wine_white", category:"wine", name:"白ワイン", desc:"" },

      { id:"soft_calpis", category:"soft", name:"カルピス", desc:"" },
      { id:"soft_oolong", category:"soft", name:"ウーロン茶", desc:"" },
      { id:"soft_cola", category:"soft", name:"コーラ", desc:"" },
      { id:"soft_ginger", category:"soft", name:"ジンジャーエール", desc:"" },
      { id:"soft_orange", category:"soft", name:"オレンジジュース", desc:"" }
    ];

    const qs = new URLSearchParams(location.search);
    const tableParam = qs.get("table");
    const table = Number(tableParam);
    const tableOk = Number.isFinite(table) && table > 0;

    const tablePill = document.getElementById("tablePill");
    const tableNoEl = document.getElementById("tableNo");
    const catNavEl = document.getElementById("catNav");
    const drawerNavEl = document.getElementById("drawerNav");
    const menuEl = document.getElementById("menu");
    const cartCount = document.getElementById("cartCount");
    const bottomOrderBtn = document.getElementById("bottomOrderBtn");
    const confirmModal = document.getElementById("confirmModal");
    const confirmOverlay = document.getElementById("confirmOverlay");
    const confirmContent = document.getElementById("confirmContent");
    const confirmSummary = document.getElementById("confirmSummary");
    const confirmClose = document.getElementById("confirmClose");
    const cancelConfirm = document.getElementById("cancelConfirm");
    const finalOrderBtn = document.getElementById("finalOrderBtn");

    const CART_KEY = tableOk ? `drink_cart_table_${table}` : "drink_cart_unknown";
    let cart = {};
    let addQty = {};
    let pressTimer = null;
    let pressInterval = null;

    try{
      const saved = localStorage.getItem(CART_KEY);
      if (saved) cart = JSON.parse(saved) || {};
    } catch {}

    if (tableOk) {
      tablePill.style.display = "inline-flex";
      tableNoEl.textContent = String(table);
    }

    function toast(msg){
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.style.display = "block";
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => t.style.display = "none", 2200);
    }

    if (!tableOk){
      toast("URLに ?table=1 のようにテーブル番号を付けてください");
    }

    function safeText(v, fallback="-"){
      if (v === null || v === undefined) return fallback;
      const s = String(v).trim();
      return s.length ? s : fallback;
    }

    function vibrateOnSuccess(ms = 60){
      try{
        if (typeof navigator !== "undefined" && "vibrate" in navigator) {
          navigator.vibrate(ms);
        }
      } catch {}
    }

    function saveCart(){
      try{
        localStorage.setItem(CART_KEY, JSON.stringify(cart));
      } catch {}
    }

    function totalCartCount(){
      return Object.values(cart).reduce((sum, item) => sum + Number(item.qty || 0), 0);
    }

    function updateCartCount(){
      cartCount.textContent = String(totalCartCount());
      bottomOrderBtn.disabled = totalCartCount() === 0;
      bottomOrderBtn.style.opacity = totalCartCount() === 0 ? "0.6" : "1";
    }

    function getAddQty(id){
      const v = Number(addQty[id] ?? 1);
      return Math.max(1, Math.min(10, v));
    }

    function setAddQty(id, v){
      addQty[id] = Math.max(1, Math.min(10, Number(v) || 1));
    }

    function addToCart(id){
      const m = MENU.find(x => x.id === id);
      if (!m) return;

      const qty = getAddQty(id);
      if (!cart[id]) cart[id] = { id:m.id, name:m.name, qty:0 };
      cart[id].qty += qty;

      saveCart();
      updateCartCount();
      toast(`${m.name} ×${qty} をカートに入れました`);

      const card = menuEl.querySelector(`.itemCard[data-item="${CSS.escape(id)}"]`);
      if (card){
        card.classList.add("flash");
        clearTimeout(card._flashTimer);
        card._flashTimer = setTimeout(() => card.classList.remove("flash"), 420);
      }
    }

    function renderConfirm(){
      const items = Object.values(cart).filter(x => x.qty > 0);

      if (!items.length){
        confirmContent.innerHTML = `<div class="confirmEmpty">カートが空です</div>`;
        confirmSummary.textContent = "";
        return;
      }

      confirmContent.innerHTML = `
        <div class="confirmList">
          ${items.map(item => `
            <div class="confirmRow">
              <div class="confirmName">${item.name}</div>
              <div class="confirmQty">×${item.qty}</div>
            </div>
          `).join("")}
        </div>
      `;

      const totalQty = items.reduce((sum, x) => sum + x.qty, 0);
      confirmSummary.textContent = `合計 ${totalQty} 点を注文します。内容をご確認ください。`;
    }

    function openConfirm(){
      if (totalCartCount() === 0){
        toast("カートが空です");
        return;
      }
      renderConfirm();
      confirmModal.classList.add("show");
      confirmOverlay.classList.add("show");
      confirmModal.setAttribute("aria-hidden", "false");
      document.body.classList.add("menu-open");
    }

    function closeConfirm(){
      confirmModal.classList.remove("show");
      confirmOverlay.classList.remove("show");
      confirmModal.setAttribute("aria-hidden", "true");
      document.body.classList.remove("menu-open");
    }

    async function submitOrder(){
      if (!tableOk){
        toast("テーブル番号が必要です");
        return;
      }

      const items = Object.values(cart).filter(x => x.qty > 0);
      if (!items.length){
        toast("カートが空です");
        return;
      }

      const totalQty = items.reduce((sum, x) => sum + x.qty, 0);

      finalOrderBtn.disabled = true;
      const oldText = finalOrderBtn.textContent;
      finalOrderBtn.textContent = "送信中…";

      try{
        await addDoc(collection(db, "orders"), {
          type: "drink",
          table: table,
          items: items.map(x => ({ name:x.name, qty:x.qty })),
          total: 0,
          totalQty: totalQty,
          status: "new",
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        cart = {};
        saveCart();
        updateCartCount();
        closeConfirm();
        vibrateOnSuccess(80);
        toast("注文しました");
      } catch (e){
        console.error(e);
        toast("注文に失敗しました");
      } finally {
        finalOrderBtn.textContent = oldText;
        finalOrderBtn.disabled = false;
      }
    }

    bottomOrderBtn.addEventListener("click", openConfirm);
    confirmClose.addEventListener("click", closeConfirm);
    cancelConfirm.addEventListener("click", closeConfirm);
    confirmOverlay.addEventListener("click", closeConfirm);
    finalOrderBtn.addEventListener("click", submitOrder);

    const hamburger = document.getElementById("hamburger");
    const drawer = document.getElementById("drawer");
    const drawerOverlay = document.getElementById("drawerOverlay");
    const drawerClose = document.getElementById("drawerClose");

    function openDrawer(){
      drawer.classList.add("show");
      drawerOverlay.classList.add("show");
      drawer.setAttribute("aria-hidden", "false");
      document.body.classList.add("menu-open");
    }

    function closeDrawer(){
      drawer.classList.remove("show");
      drawerOverlay.classList.remove("show");
      drawer.setAttribute("aria-hidden", "true");
      document.body.classList.remove("menu-open");
    }

    hamburger?.addEventListener("click", openDrawer);
    drawerClose?.addEventListener("click", closeDrawer);
    drawerOverlay?.addEventListener("click", closeDrawer);

    function goCategory(catId){
      const el = document.getElementById(`cat-${catId}`);
      if (el) el.scrollIntoView({ behavior:"smooth", block:"start" });
      closeDrawer();
    }

    function renderNavInto(container){
      if (!container) return;

      const counts = new Map();
      for (const c of CATEGORIES) {
        counts.set(c.id, MENU.filter(m => m.category === c.id).length);
      }

      container.innerHTML = CATEGORIES.map(c => {
        const count = counts.get(c.id) ?? 0;
        return `<a class="navBtn" data-nav="${c.id}" href="#cat-${c.id}">
          <span>${c.label}</span><small>${count}</small>
        </a>`;
      }).join("");

      container.querySelectorAll("a.navBtn").forEach(a => {
        a.addEventListener("click", (e) => {
          const key = a.getAttribute("data-nav");
          if (!key) return;
          e.preventDefault();
          goCategory(key);
        });
      });
    }

    function renderNav(){
      renderNavInto(catNavEl);
      renderNavInto(drawerNavEl);
    }

    function renderMenu(){
      const byCat = new Map();
      for (const c of CATEGORIES) byCat.set(c.id, []);
      for (const m of MENU) {
        if (!byCat.has(m.category)) byCat.set(m.category, []);
        byCat.get(m.category).push(m);
      }

      menuEl.innerHTML = CATEGORIES.map(c => {
        const items = byCat.get(c.id) || [];

        const grid = items.map(m => {
          const qty = getAddQty(m.id);

          return `
            <div class="itemCard" data-item="${m.id}">
              <div class="flashMark">✓</div>

              <div style="min-width:0;">
                <h3>${safeText(m.name, "-")}</h3>
                <p class="desc">${safeText(m.desc, "")}</p>
              </div>

              <div class="stepRow">
                <div class="stepper" aria-label="数量">
                  <button class="stepBtn" data-step-minus="${m.id}">−</button>
                  <div class="stepQty" data-step-qty="${m.id}">${qty}</div>
                  <button class="stepBtn" data-step-plus="${m.id}">＋</button>
                </div>
                <button class="cartAddBtn" data-cart-add="${m.id}">カートに入れる</button>
              </div>
            </div>
          `;
        }).join("");

        return `
          <div class="section" id="cat-${c.id}">
            <div class="sectionHead">
              <h2>${c.label}</h2>
              <p>${items.length} 品</p>
            </div>
            <div class="menuGrid">
              ${grid || `<div style="color:var(--muted);padding:6px 10px;">（準備中）</div>`}
            </div>
          </div>
        `;
      }).join("");
    }

    function updateQtyDisplay(id){
      const qEl = menuEl.querySelector(`[data-step-qty="${CSS.escape(id)}"]`);
      if (qEl) qEl.textContent = String(getAddQty(id));
    }

    function startLongPressAdjust(id, direction){
      stopLongPressAdjust();

      pressTimer = setTimeout(() => {
        pressInterval = setInterval(() => {
          setAddQty(id, getAddQty(id) + direction);
          updateQtyDisplay(id);
        }, 120);
      }, 280);
    }

    function stopLongPressAdjust(){
      if (pressTimer){
        clearTimeout(pressTimer);
        pressTimer = null;
      }
      if (pressInterval){
        clearInterval(pressInterval);
        pressInterval = null;
      }
    }

    menuEl.addEventListener("click", (e) => {
      const btnMinus = e.target.closest("[data-step-minus]");
      const btnPlus = e.target.closest("[data-step-plus]");
      const btnCartAdd = e.target.closest("[data-cart-add]");

      if (btnMinus){
        const id = btnMinus.getAttribute("data-step-minus");
        setAddQty(id, getAddQty(id) - 1);
        updateQtyDisplay(id);
        return;
      }

      if (btnPlus){
        const id = btnPlus.getAttribute("data-step-plus");
        setAddQty(id, getAddQty(id) + 1);
        updateQtyDisplay(id);
        return;
      }

      if (btnCartAdd){
        const id = btnCartAdd.getAttribute("data-cart-add");
        addToCart(id);
      }
    });

    menuEl.addEventListener("mousedown", (e) => {
      const btnMinus = e.target.closest("[data-step-minus]");
      const btnPlus = e.target.closest("[data-step-plus]");

      if (btnMinus){
        const id = btnMinus.getAttribute("data-step-minus");
        startLongPressAdjust(id, -1);
      }

      if (btnPlus){
        const id = btnPlus.getAttribute("data-step-plus");
        startLongPressAdjust(id, +1);
      }
    });

    menuEl.addEventListener("mouseup", stopLongPressAdjust);
    menuEl.addEventListener("mouseleave", stopLongPressAdjust);

    menuEl.addEventListener("touchstart", (e) => {
      const btnMinus = e.target.closest("[data-step-minus]");
      const btnPlus = e.target.closest("[data-step-plus]");

      if (btnMinus){
        const id = btnMinus.getAttribute("data-step-minus");
        startLongPressAdjust(id, -1);
      }

      if (btnPlus){
        const id = btnPlus.getAttribute("data-step-plus");
        startLongPressAdjust(id, +1);
      }
    }, { passive:true });

    menuEl.addEventListener("touchend", stopLongPressAdjust);
    menuEl.addEventListener("touchcancel", stopLongPressAdjust);

    updateCartCount();
    renderNav();
    renderMenu();
  </script>
</body>
</html>
